<style>

<script>
/* ════════════════════════════════════════════════════════════
   LAYOUT
════════════════════════════════════════════════════════════ */
const N   = 4;
const PAD = 14;
const GAP = 12;

const boardEl   = document.getElementById('board');
const boardWrap = document.getElementById('boardWrap');

const BSIZ = Math.min(480, window.innerWidth - 24);
const CSIZ = (BSIZ - PAD * 2 - GAP * (N - 1)) / N;

boardEl.style.width  = BSIZ + 'px';
boardEl.style.height = BSIZ + 'px';

function px(i)  { return PAD + i * (CSIZ + GAP); }
function cx(col){ return px(col) + CSIZ / 2; }
function cy(row){ return px(row) + CSIZ / 2; }

function fontSize(v) {
  const d = String(v).length;
  if (d <= 2) return Math.round(CSIZ * .42) + 'px';
  if (d === 3) return Math.round(CSIZ * .34) + 'px';
  if (d === 4) return Math.round(CSIZ * .27) + 'px';
  return Math.round(CSIZ * .22) + 'px';
}
function tileClass(v) { return v <= 2048 ? 'v' + v : 'vbig'; }

// Build background grid
for (let r = 0; r < N; r++)
  for (let c = 0; c < N; c++) {
    const d = document.createElement('div');
    d.className = 'cell-bg';
    d.style.cssText = `width:${CSIZ}px;height:${CSIZ}px;left:${px(c)}px;top:${px(r)}px`;
    boardEl.appendChild(d);
  }

/* ════════════════════════════════════════════════════════════
   SOUND
════════════════════════════════════════════════════════════ */
let muted = false;
let audioCtx = null;
function getAC() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playSlide() {
  if (muted) return;
  const ac = getAC(), now = ac.currentTime;
  const len = Math.ceil(ac.sampleRate * 0.09);
  const buf = ac.createBuffer(1, len, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  const src = ac.createBufferSource(); src.buffer = buf;
  const bp = ac.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.setValueAtTime(900, now);
  bp.frequency.exponentialRampToValueAtTime(200, now + .09);
  bp.Q.value = .7;
  const g = ac.createGain();
  g.gain.setValueAtTime(.16, now);
  g.gain.exponentialRampToValueAtTime(.001, now + .09);
  src.connect(bp); bp.connect(g); g.connect(ac.destination);
  src.start();
}

const NOTE = [261,294,330,370,415,466,523,587,659,740,880,1047];
function playMerge(v) {
  if (muted) return;
  const ac = getAC(), now = ac.currentTime;
  const n = Math.min(Math.round(Math.log2(v) - 1), NOTE.length - 1);
  const freq = NOTE[n];
  const osc = ac.createOscillator(); osc.type = 'triangle'; osc.frequency.value = freq;
  const g = ac.createGain();
  g.gain.setValueAtTime(.22, now); g.gain.exponentialRampToValueAtTime(.001, now + .4);
  osc.connect(g); g.connect(ac.destination); osc.start(now); osc.stop(now + .4);
  if (v >= 64) {
    const o2 = ac.createOscillator(); o2.type = 'sine'; o2.frequency.value = freq * 1.5;
    const g2 = ac.createGain();
    g2.gain.setValueAtTime(.07, now); g2.gain.exponentialRampToValueAtTime(.001, now + .3);
    o2.connect(g2); g2.connect(ac.destination); o2.start(now); o2.stop(now + .3);
  }
}
function playWin() {
  if (muted) return;
  const ac = getAC();
  [523,659,784,1047,1319].forEach((freq, i) => {
    const osc = ac.createOscillator(); osc.type = 'triangle'; osc.frequency.value = freq;
    const g = ac.createGain(), t = ac.currentTime + i * .11;
    g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(.15, t + .06);
    g.gain.exponentialRampToValueAtTime(.001, t + .8);
    osc.connect(g); g.connect(ac.destination); osc.start(t); osc.stop(t + .8);
  });
}
function playGameOver() {
  if (muted) return;
  const ac = getAC();
  [440,370,294,220].forEach((freq, i) => {
    const osc = ac.createOscillator(); osc.type = 'sawtooth'; osc.frequency.value = freq;
    const g = ac.createGain(), t = ac.currentTime + i * .18;
    g.gain.setValueAtTime(.12, t); g.gain.exponentialRampToValueAtTime(.001, t + .22);
    osc.connect(g); g.connect(ac.destination); osc.start(t); osc.stop(t + .25);
  });
}

/* ════════════════════════════════════════════════════════════
   PARTICLES & FX
════════════════════════════════════════════════════════════ */
const TILE_CLR = {
  2:'#cdc1b4',4:'#bfad9f',8:'#e8853c',16:'#e8633c',32:'#e84a1f',
  64:'#d93b0e',128:'#e8be2c',256:'#e8b520',512:'#e8a800',1024:'#e89500',2048:'#f9ca24'
};

function spawnParticles(row, col, value) {
  const count = value >= 512 ? 14 : value >= 128 ? 10 : 6;
  const color = TILE_CLR[Math.min(value, 2048)] || '#fff';
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size  = 4 + Math.random() * 6;
    const angle = (i / count) * Math.PI * 2 + Math.random() * .3;
    const dist  = 28 + Math.random() * (value >= 512 ? 60 : 36);
    p.style.cssText = `
      width:${size}px;height:${size}px;background:${color};
      left:${cx(col)}px;top:${cy(row)}px;
      --dx:${Math.cos(angle)*dist}px;--dy:${Math.sin(angle)*dist}px;
      animation-duration:${.38 + Math.random()*.2}s;
      animation-delay:${Math.random()*.04}s;
    `;
    boardEl.appendChild(p);
    p.addEventListener('animationend', () => p.remove(), {once:true});
  }
}

function showScorePopup(value, row, col) {
  const el = document.createElement('div');
  el.className = 'score-popup';
  el.textContent = '+' + value;
  el.style.left = cx(col) + 'px';
  el.style.top  = px(row) + 'px';
  boardEl.appendChild(el);
  el.addEventListener('animationend', () => el.remove(), {once:true});
}

function triggerShake() {
  boardWrap.classList.remove('shake');
  void boardWrap.offsetWidth;
  boardWrap.classList.add('shake');
  boardWrap.addEventListener('animationend', () => boardWrap.classList.remove('shake'), {once:true});
}

const CONF = ['#f9ca24','#f0932b','#eb4d4b','#6c5ce7','#00b894','#0984e3','#fd79a8'];
function launchConfetti() {
  for (let i = 0; i < 90; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    const dur = 1.8 + Math.random() * 1.4;
    el.style.cssText = `background:${CONF[i%CONF.length]};left:${Math.random()*100}vw;
      top:-20px;animation-duration:${dur}s;animation-delay:${Math.random()*1.2}s;
      transform:rotate(${Math.random()*360}deg);
      border-radius:${Math.random()>.5?'50%':'2px'};`;
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove(), {once:true});
  }
}

/* ════════════════════════════════════════════════════════════
   GAME STATE
════════════════════════════════════════════════════════════ */
let score  = 0;
let best   = +localStorage.getItem('2048-best') || 0;
let won    = false;
let busy   = false;
let grid   = [];
let tiles  = new Map();
let nextId = 0;

function makeTileEl(value, row, col, isNew) {
  const el = document.createElement('div');
  el.className = `tile ${tileClass(value)}${isNew ? ' tile-new' : ''}`;
  el.style.cssText = `width:${CSIZ}px;height:${CSIZ}px;font-size:${fontSize(value)};left:${px(col)}px;top:${px(row)}px`;
  el.textContent = value;
  if (isNew) el.addEventListener('animationend', () => el.classList.remove('tile-new'), {once:true});
  boardEl.appendChild(el);
  return el;
}

function spawnTile(value, row, col, isNew = true) {
  const id = nextId++;
  const el = makeTileEl(value, row, col, isNew);
  tiles.set(id, {el, value, row, col});
  grid[row][col] = id;
  return id;
}

function removeTile(id) { tiles.get(id).el.remove(); tiles.delete(id); }

/* ── Slide logic ── */
function slideRow(rowData) {
  const src = rowData.map((x, i) => x ? {...x, vc:i} : null).filter(Boolean);
  const out = []; let toCol = 0, i = 0;
  while (i < src.length) {
    if (i + 1 < src.length && src[i].value === src[i+1].value) {
      out.push({fromIds:[src[i].id, src[i+1].id], value: src[i].value * 2, toCol});
      i += 2;
    } else {
      out.push({fromIds:[src[i].id], value: src[i].value, toCol});
      i++;
    }
    toCol++;
  }
  return out;
}

/* ── Move ── */
function move(dir) {
  if (busy) return;
  function v2r(vr, vc) {
    if (dir==='left')  return [vr,     vc    ];
    if (dir==='right') return [vr, N-1-vc    ];
    if (dir==='up')    return [vc,     vr    ];
    if (dir==='down')  return [N-1-vc, vr    ];
  }
  const vRows = Array.from({length:N}, (_,vr) =>
    Array.from({length:N}, (__,vc) => {
      const [r,c] = v2r(vr,vc), id = grid[r][c];
      return id !== null ? {id, value: tiles.get(id).value} : null;
    })
  );
  for (let r=0;r<N;r++) for (let c=0;c<N;c++) grid[r][c]=null;

  let moved=false, pts=0;
  const merges=[];

  for (let vr=0; vr<N; vr++) {
    for (const item of slideRow(vRows[vr])) {
      const [r,c] = v2r(vr, item.toCol);
      const sid   = item.fromIds[0];
      const ts    = tiles.get(sid);
      if (ts.row!==r || ts.col!==c) moved=true;
      if (item.fromIds.length===2) { moved=true; pts+=item.value; }
      ts.row=r; ts.col=c; ts.value=item.value; grid[r][c]=sid;
      if (item.fromIds.length===2) {
        const aid=item.fromIds[1], ta=tiles.get(aid);
        ta.row=r; ta.col=c; ta.el.style.zIndex=1;
        merges.push({sid, aid, value:item.value, row:r, col:c});
      }
    }
  }
  if (!moved) return;

  playSlide();
  score += pts;
  if (score > best) { best=score; localStorage.setItem('2048-best', best); }
  updateScoreDisplay();

  tiles.forEach(t => {
    t.el.style.left = px(t.col)+'px';
    t.el.style.top  = px(t.row)+'px';
  });

  busy=true;
  setTimeout(() => {
    for (const {sid, aid, value, row, col} of merges) {
      removeTile(aid);
      const ts=tiles.get(sid);
      ts.value=value;
      ts.el.className=`tile ${tileClass(value)} tile-merged`;
      ts.el.style.fontSize=fontSize(value);
      ts.el.textContent=value;
      ts.el.style.zIndex=2;
      ts.el.addEventListener('animationend', ()=>ts.el.classList.remove('tile-merged'), {once:true});
      playMerge(value);
      spawnParticles(row, col, value);
      showScorePopup(value, row, col);
      if (value >= 512) triggerShake();
    }
    addRandom();
    busy=false;
    checkState();
  }, 110);
}

function addRandom() {
  const empty=[];
  for (let r=0;r<N;r++) for (let c=0;c<N;c++) if (grid[r][c]===null) empty.push([r,c]);
  if (!empty.length) return;
  const [r,c]=empty[Math.floor(Math.random()*empty.length)];
  spawnTile(Math.random()<.9?2:4, r, c, true);
}

/* ── Score display with bump animation ── */
function updateScoreDisplay() {
  const sEl = document.getElementById('score');
  const bEl = document.getElementById('best');
  sEl.textContent = score;
  bEl.textContent = best;
  sEl.classList.remove('bump'); void sEl.offsetWidth; sEl.classList.add('bump');
  if (score === best) { bEl.classList.remove('bump'); void bEl.offsetWidth; bEl.classList.add('bump'); }
}

/* ── Win / Lose ── */
function checkState() {
  if (!won) {
    for (const [,t] of tiles) {
      if (t.value===2048) {
        document.getElementById('winScore').textContent = `最终分数：${score}`;
        document.getElementById('ovWin').classList.add('show');
        playWin();
        setTimeout(launchConfetti, 300);
        saveScore(score);
        won=true;
        return;
      }
    }
  }
  for (let r=0;r<N;r++) {
    for (let c=0;c<N;c++) {
      if (grid[r][c]===null) return;
      const v=tiles.get(grid[r][c]).value;
      if (c<N-1 && grid[r][c+1]!==null && tiles.get(grid[r][c+1]).value===v) return;
      if (r<N-1 && grid[r+1][c]!==null && tiles.get(grid[r+1][c]).value===v) return;
    }
  }
  document.getElementById('overScore').textContent = `最终分数：${score}`;
  document.getElementById('ovOver').classList.add('show');
  playGameOver();
  saveScore(score);
}

/* ════════════════════════════════════════════════════════════
   LEADERBOARD
════════════════════════════════════════════════════════════ */
function saveScore(s) {
  if (!s) return;
  let history = JSON.parse(localStorage.getItem('2048-history') || '[]');
  history.push({score: s, date: new Date().toLocaleDateString('zh-CN')});
  history.sort((a,b) => b.score - a.score);
  history = history.slice(0, 20);
  localStorage.setItem('2048-history', JSON.stringify(history));
}

function renderLb() {
  const history = JSON.parse(localStorage.getItem('2048-history') || '[]');
  const el = document.getElementById('lbContent');
  if (!history.length) {
    el.innerHTML = '<div class="lb-empty">暂无记录，打完一局再来！</div>';
    return;
  }
  el.innerHTML = history.map((item, i) => {
    const rankClass = i===0 ? 'top1' : i===1 ? 'top2' : i===2 ? 'top3' : '';
    const medal     = i===0 ? '🥇' : i===1 ? '🥈' : i===2 ? '🥉' : (i+1);
    const badge     = i===0 ? '最高纪录' : '';
    return `
      <div class="lb-row ${rankClass}">
        <div class="lb-rank">${medal}</div>
        <div class="lb-info">
          <div class="lb-score">${item.score.toLocaleString()}</div>
          <div class="lb-date">${item.date}</div>
        </div>
        ${badge ? `<div class="lb-badge">${badge}</div>` : '<div></div>'}
      </div>`;
  }).join('');
}

function openLb()  { renderLb(); document.getElementById('lbBackdrop').classList.add('show'); }
function closeLb() { document.getElementById('lbBackdrop').classList.remove('show'); }

/* ════════════════════════════════════════════════════════════
   SCREENSHOT  (Canvas — no external library)
════════════════════════════════════════════════════════════ */
function drawBoard() {
  const scale = window.devicePixelRatio || 2;
  const W = BSIZ + PAD * 2 + 2;
  const H = W + 90;
  const canvas = document.createElement('canvas');
  canvas.width  = W * scale;
  canvas.height = H * scale;
  const ctx = canvas.getContext('2d');
  ctx.scale(scale, scale);

  // Background
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, W, H);

  // Header text
  ctx.fillStyle = '#f9ca24';
  ctx.font = `900 40px "Arial"`;
  ctx.fillText('2048', 16, 52);
  ctx.fillStyle = 'rgba(255,255,255,.7)';
  ctx.font = `700 16px Arial`;
  ctx.fillText(`分数  ${score.toLocaleString()}`, 16, 76);
  ctx.textAlign = 'right';
  ctx.fillText(`最高  ${best.toLocaleString()}`, W - 16, 76);
  ctx.textAlign = 'left';

  const OX = PAD + 1, OY = 90;

  // Board bg
  ctx.fillStyle = 'rgba(255,255,255,.07)';
  roundRect(ctx, OX, OY, BSIZ, BSIZ, 12);
  ctx.fill();

  // Cell bg
  for (let r=0;r<N;r++) for (let c=0;c<N;c++) {
    ctx.fillStyle = 'rgba(255,255,255,.05)';
    roundRect(ctx, OX+px(c), OY+px(r), CSIZ, CSIZ, 6);
    ctx.fill();
  }

  // Tiles
  for (const [,t] of tiles) {
    const color = TILE_CLR[Math.min(t.value,2048)] || '#3c3a32';
    ctx.fillStyle = color;
    roundRect(ctx, OX+px(t.col), OY+px(t.row), CSIZ, CSIZ, 8);
    ctx.fill();
    const textColor = t.value <= 4 ? '#776e65' : '#fff';
    ctx.fillStyle = textColor;
    const fs = t.value < 100 ? CSIZ*.38 : t.value < 1000 ? CSIZ*.3 : CSIZ*.24;
    ctx.font = `900 ${Math.round(fs)}px Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(String(t.value), OX+px(t.col)+CSIZ/2, OY+px(t.row)+CSIZ/2);
  }

  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillStyle = 'rgba(255,255,255,.25)';
  ctx.font = '12px Arial';
  ctx.fillText('play2048.app', W/2, H - 8);

  return canvas;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

async function shareScreenshot() {
  const canvas = drawBoard();
  canvas.toBlob(async blob => {
    const file = new File([blob], '2048-score.png', {type:'image/png'});
    // Try Web Share API (mobile)
    if (navigator.share && navigator.canShare && navigator.canShare({files:[file]})) {
      try {
        await navigator.share({
          files: [file],
          title: '2048 数字游戏',
          text: `我在 2048 游戏中得了 ${score} 分！来挑战我吧！`,
        });
        showToast('分享成功 🎉');
        return;
      } catch(e) { /* cancelled or failed, fall through */ }
    }
    // Fallback: download image
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `2048-${score}分.png`; a.click();
    URL.revokeObjectURL(url);
    showToast('截图已保存 📸');
  }, 'image/png');
}

/* ════════════════════════════════════════════════════════════
   TOAST
════════════════════════════════════════════════════════════ */
let toastTimer;
function showToast(msg, dur = 2200) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), dur);
}

/* ════════════════════════════════════════════════════════════
   NEW GAME
════════════════════════════════════════════════════════════ */
function newGame() {
  tiles.forEach(t => t.el.remove());
  tiles.clear();
  nextId=0;
  grid = Array.from({length:N}, () => Array(N).fill(null));
  score=0; won=false; busy=false;
  document.getElementById('ovWin').classList.remove('show');
  document.getElementById('ovOver').classList.remove('show');
  addRandom(); addRandom();
  updateScoreDisplay();
}

/* ════════════════════════════════════════════════════════════
   INPUT
════════════════════════════════════════════════════════════ */
const KEY_MAP = {
  ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down',
  a:'left',d:'right',w:'up',s:'down',
  A:'left',D:'right',W:'up',S:'down',
};
document.addEventListener('keydown', e => {
  const dir = KEY_MAP[e.key];
  if (dir) { e.preventDefault(); move(dir); }
});

let touchOrigin = null;
boardEl.addEventListener('touchstart', e => {
  touchOrigin = {x:e.touches[0].clientX, y:e.touches[0].clientY};
}, {passive:true});
boardEl.addEventListener('touchend', e => {
  if (!touchOrigin) return;
  const dx = e.changedTouches[0].clientX - touchOrigin.x;
  const dy = e.changedTouches[0].clientY - touchOrigin.y;
  touchOrigin = null;
  if (Math.max(Math.abs(dx),Math.abs(dy)) < 24) return;
  if (Math.abs(dx) > Math.abs(dy)) move(dx>0?'right':'left');
  else                              move(dy>0?'down':'up');
});

/* ── Button wiring ── */
document.getElementById('btnNew').onclick    = newGame;
document.getElementById('btnKeep').onclick   = () => { won=true; document.getElementById('ovWin').classList.remove('show'); };
document.getElementById('btnMute').onclick   = function() { muted=!muted; this.textContent=muted?'🔇':'🔊'; };
document.getElementById('btnLb').onclick     = openLb;
document.getElementById('btnShare').onclick  = shareScreenshot;
document.getElementById('btnCloseLb').onclick= closeLb;
document.getElementById('btnClearLb').onclick= () => {
  if (confirm('确认清空所有历史记录？')) {
    localStorage.removeItem('2048-history');
    renderLb();
    showToast('记录已清空');
  }
};
document.getElementById('lbBackdrop').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeLb();
});

/* ════════════════════════════════════════════════════════════
   START
════════════════════════════════════════════════════════════ */
updateScoreDisplay();
newGame();
</script>
