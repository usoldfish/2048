<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>2048 Masterpiece</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="lang-selector">
                <button onclick="changeLang('zh')">中文</button>
                <button onclick="changeLang('en')">EN</button>
                <button onclick="changeLang('ja')">日本語</button>
            </div>
            <h1 id="title" onclick="triggerEasterEgg()">2048</h1>
            <div class="score-container">
                <div class="score-box"><span id="lbl-score">得分</span><div id="score">0</div></div>
                <div class="score-box"><span id="lbl-best">最高</span><div id="best-score">0</div></div>
            </div>
        </header>

        <div class="above-game">
            <p id="game-intro">合并数字，冲向 2048！</p>
            <button id="restart-btn" onclick="initGame()">新游戏</button>
        </div>

        <div id="game-container">
            <div class="grid-container">
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            </div>
            <div class="tile-container" id="tile-container"></div>
            
            <div id="game-message" class="game-message">
                <p id="status-text"></p>
                <button onclick="initGame()" id="keep-going-btn">再试一次</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
